# Render blueprint — deploys the ENTIRE Bayan AI stack from one file:
#   1) PostgreSQL database
#   2) FastAPI backend (Docker) with a persistent disk for FAISS indexes
#   3) React frontend (static site), auto-pointed at the backend URL
#
# How to use: push this repo to GitHub, then on Render click
# "New +" → "Blueprint" → pick this repo → "Apply". Set GEMINI_API_KEYS when asked.

services:
  # ---- Backend API ----------------------------------------------------------
  - type: web
    name: bayan-ai-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    # NOTE: the free plan has no persistent disk, so FAISS indexes live in the
    # container's ephemeral storage and are rebuilt after a restart. To make them
    # permanent, upgrade this service to a paid plan and add a `disk:` block
    # mounted at /app/data.
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bayan-ai-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: GEMINI_API_KEYS
        sync: false            # you paste your Gemini key(s) in the dashboard
      - key: INDEXES_DIR
        value: /app/data/indexes
      - key: UPLOADS_DIR
        value: /app/data/uploads

  # ---- Frontend (static site) ----------------------------------------------
  - type: web
    name: bayan-ai-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # Build-time: point the SPA at the backend service automatically.
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: bayan-ai-backend
          property: host

databases:
  - name: bayan-ai-db
    plan: free
